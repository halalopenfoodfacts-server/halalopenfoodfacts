<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test API Open Food Facts</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .product { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Test API Open Food Facts</h1>
    <button onclick="testAPI()">Tester l'API</button>
    <div id="status"></div>
    <div id="results"></div>

    <script>
        async function testAPI() {
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            statusDiv.innerHTML = '<p>Chargement...</p>';
            resultsDiv.innerHTML = '';
            
            try {
                const url = 'https://world.openfoodfacts.org/cgi/search.pl?search_simple=1&action=process&search_terms=&page_size=10&page=1&json=1&sort_by=unique_scans_n';
                
                console.log('Fetching:', url);
                const response = await fetch(url);
                
                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                console.log('Data:', data);
                console.log('Count:', data.count);
                console.log('Products:', data.products?.length);
                
                statusDiv.innerHTML = `
                    <p class="success">✅ API fonctionne!</p>
                    <p>Total produits dans la base: <strong>${data.count?.toLocaleString('fr-FR')}</strong></p>
                    <p>Produits reçus: <strong>${data.products?.length || 0}</strong></p>
                `;
                
                if (data.products && data.products.length > 0) {
                    resultsDiv.innerHTML = '<h2>Premiers produits:</h2>';
                    data.products.forEach(product => {
                        const div = document.createElement('div');
                        div.className = 'product';
                        div.innerHTML = `
                            <strong>${product.product_name || 'Nom inconnu'}</strong><br>
                            Marque: ${product.brands || 'N/A'}<br>
                            Code: ${product.code}<br>
                            <img src="${product.image_front_small_url || product.image_front_url}" 
                                 style="max-width: 100px; max-height: 100px;" 
                                 onerror="this.style.display='none'">
                        `;
                        resultsDiv.appendChild(div);
                    });
                } else {
                    resultsDiv.innerHTML = '<p class="error">⚠️ Aucun produit reçu!</p>';
                }
                
            } catch (error) {
                console.error('Error:', error);
                statusDiv.innerHTML = `<p class="error">❌ Erreur: ${error.message}</p>`;
            }
        }
        
        // Test automatique au chargement
        window.addEventListener('DOMContentLoaded', () => {
            console.log('Page chargée, test automatique...');
            testAPI();
        });
    </script>
</body>
</html>
