server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Activer la compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache pour les assets statiques
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- Proxy API v2 (4M+ produits, sans CORS) ----
    location /proxy/v2/ {
        proxy_pass https://world.openfoodfacts.org/api/v2/;
        proxy_ssl_server_name on;
        proxy_set_header Host world.openfoodfacts.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }

    # ---- Proxy Search-a-licious (recherche texte, fallback) ----
    location /proxy/search/ {
        proxy_pass https://search.openfoodfacts.org/;
        proxy_ssl_server_name on;
        proxy_set_header Host search.openfoodfacts.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }

    # ---- Proxy facets (stats contributeurs, pays) ----
    location /proxy/facets/ {
        proxy_pass https://world.openfoodfacts.org/facets/;
        proxy_ssl_server_name on;
        proxy_set_header Host world.openfoodfacts.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }
}
